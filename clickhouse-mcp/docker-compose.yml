services:
  mcp-server:
    image: ${MCP_SERVER_IMAGE:-rawbbit-clickhouse-mcp:local}
    build:
      context: .
    container_name: rawbbit-clickhouse-mcp
    restart: unless-stopped
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      MCP_PATH: ${MCP_PATH:-/mcp}
      MCP_MAX_QUERY_ROWS: ${MCP_MAX_QUERY_ROWS:-500}
      MCP_MAX_SAMPLE_ROWS: ${MCP_MAX_SAMPLE_ROWS:-50}
      MCP_MAX_EXECUTION_SECONDS: ${MCP_MAX_EXECUTION_SECONDS:-30}
      MCP_BOT_USER_AGENT_REGEX: ${MCP_BOT_USER_AGENT_REGEX:-bot|spider|crawler|headless|bytespider|ahrefs|googlebot}
      MCP_API_KEYS_JSON: ${MCP_API_KEYS_JSON:-}
      MCP_JWT_PUBLIC_KEY: ${MCP_JWT_PUBLIC_KEY:-}
      MCP_JWT_JWKS_URI: ${MCP_JWT_JWKS_URI:-}
      MCP_JWT_ISSUER: ${MCP_JWT_ISSUER:-}
      MCP_JWT_AUDIENCE: ${MCP_JWT_AUDIENCE:-}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-host.docker.internal}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT:-8123}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-analytics}
      CLICKHOUSE_TABLE: ${CLICKHOUSE_TABLE:-events}
      CLICKHOUSE_SECURE: ${CLICKHOUSE_SECURE:-0}
      CLICKHOUSE_VERIFY: ${CLICKHOUSE_VERIFY:-1}
    ports:
      - "127.0.0.1:${MCP_BIND_HOST_PORT:-8000}:8000"
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - web
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:18
    container_name: metabase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # Postgres 18+ prefers the parent mount so data lands in a versioned subdirectory.
      - metabase_postgres_data:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true

  metabase:
    image: metabase/metabase:v0.61.4.6
    container_name: metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${POSTGRES_DB}
      MB_DB_PORT: 5432
      MB_DB_HOST: postgres
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      JAVA_TIMEZONE: ${METABASE_TIMEZONE:-UTC}
      MB_SITE_URL: https://${METABASE_DOMAIN}
    ports:
      - "127.0.0.1:${METABASE_BIND_HOST_PORT:-3000}:3000"
    networks:
      - internal
      - web
    security_opt:
      - no-new-privileges:true

  caddy-mcp:
    image: caddy:2
    container_name: rawbbit-clickhouse-mcp-caddy
    restart: unless-stopped
    depends_on:
      - mcp-server
    environment:
      MCP_DOMAIN: ${MCP_DOMAIN:?MCP_DOMAIN is required}
      MCP_PATH: ${MCP_PATH:-/mcp}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile.mcp:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    security_opt:
      - no-new-privileges:true

  caddy-metabase:
    image: caddy:2
    profiles: ["ingress-metabase"]
    restart: unless-stopped
    depends_on:
      - metabase
    environment:
      METABASE_DOMAIN: ${METABASE_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile.metabase:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    security_opt:
      - no-new-privileges:true

  caddy-shared:
    image: caddy:2
    container_name: rawbbit-shared-caddy
    restart: unless-stopped
    depends_on:
      - mcp-server
      - metabase
    environment:
      MCP_DOMAIN: ${MCP_DOMAIN:?MCP_DOMAIN is required}
      MCP_PATH: ${MCP_PATH:-/mcp}
      METABASE_DOMAIN: ${METABASE_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    security_opt:
      - no-new-privileges:true

volumes:
  metabase_postgres_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    internal: true
  web:
